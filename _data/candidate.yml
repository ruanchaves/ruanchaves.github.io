projects:
  - name: "Napolab"
    url: "https://github.com/ruanchaves/napolab"
    stars: "72 stars"
    label: "Flagship project"
    summary: "A benchmark for Portuguese language models that challenged assumptions about the advantage of Portuguese-only models and highlighted contamination and evaluation quality issues."
    proof:
      - "Backed by master's thesis at the University of Malta"
      - "Includes a live leaderboard on Hugging Face Spaces"
      - "Strong signal for evaluation rigor and benchmark design"
  - name: "Hashformers"
    url: "https://github.com/ruanchaves/hashformers"
    stars: "77 stars"
    label: "Flagship project"
    summary: "Transformer and beam-search based hashtag segmentation system recognized as state of the art in LREC 2022."
    proof:
      - "Research-backed open-source package"
      - "Demonstrates applied NLP system design"
      - "Useful example of turning research into reusable tooling"
  - name: "COLIEE codebase"
    url: "https://github.com/neuralmind-ai/coliee"
    label: "Supporting proof"
    stars: "Competition code"
    summary: "Supporting code for legal retrieval and legal entailment work, including a first-place zero-shot system."
    proof:
      - "Shows retrieval, ranking, and evaluation depth"
      - "Connects directly to published work and competition performance"
